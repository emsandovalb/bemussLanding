<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bemuss enterprise software artwork">
  <defs>
    <linearGradient id="bg" x1="180" y1="120" x2="1240" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101C"/>
