<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bemuss barber shop artwork">
  <defs>
    <linearGradient id="bg" x1="180" y1="120" x2="1240" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07101C"/>
      <stop offset="1" stop-color="#040712"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#8FD3FF"/>
      <stop offset="0.55" stop-color="#2F82FF"/>
      <stop offset="1" stop-color="#0B5CFF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F9E2A0"/>
      <stop offset="1" stop-color="#C47B2B"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.52"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#60A5FA" flood-opacity="0.14"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <ellipse cx="1040" cy="810" rx="370" ry="88" fill="#2563EB" fill-opacity="0.24" filter="url(#glow)"/>
  <ellipse cx="300" cy="130" rx="190" ry="120" fill="#60A5FA" fill-opacity="0.10" filter="url(#soft)"/>
  <ellipse cx="1130" cy="154" rx="150" ry="92" fill="#60A5FA" fill-opacity="0.08" filter="url(#soft)"/>

